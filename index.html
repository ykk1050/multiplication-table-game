<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구구단 대장간 — Multiplication Blacksmith</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d0d14;
  --panel: #161624;
  --panel-border: #2a2a44;
  --accent: #ff6a00;
  --accent-glow: #ff8c33;
  --success: #00e87b;
  --danger: #ff3a3a;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --gold: #ffd700;
  --boss-hp: #e53e3e;
}

@font-face {
  font-family: 'GameFont';
  src: local('Segoe UI'), local('Malgun Gothic');
}

body {
  font-family: 'GameFont', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Screen Shake ─── */
@keyframes screenShake {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-6px, -4px); }
  20% { transform: translate(6px, 4px); }
  30% { transform: translate(-4px, 6px); }
  40% { transform: translate(4px, -6px); }
  50% { transform: translate(-2px, 2px); }
  60% { transform: translate(2px, -2px); }
  70% { transform: translate(-3px, 3px); }
  80% { transform: translate(3px, -3px); }
}
.shake { animation: screenShake 0.4s ease-out; }

/* ─── Glow pulse ─── */
@keyframes glowPulse {
  0%, 100% { filter: drop-shadow(0 0 6px var(--accent)); }
  50% { filter: drop-shadow(0 0 20px var(--accent-glow)) drop-shadow(0 0 40px var(--accent)); }
}

/* ─── Overheat ─── */
@keyframes overheat {
  0% { filter: brightness(1) saturate(1); }
  20% { filter: brightness(1.8) saturate(2) hue-rotate(-10deg); }
  50% { filter: brightness(1.4) saturate(1.6) hue-rotate(-5deg); }
  100% { filter: brightness(1) saturate(1); }
}
.overheat { animation: overheat 1s ease-out; }

/* ─── Forge spark ─── */
@keyframes sparkFly {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
}

/* ─── Float up text ─── */
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
}

/* ─── Boss attack ─── */
@keyframes bossHit {
  0% { transform: translateX(0); }
  15% { transform: translateX(-20px) rotate(-5deg); }
  30% { transform: translateX(15px) rotate(3deg); }
  45% { transform: translateX(-10px) rotate(-2deg); }
  60% { transform: translateX(5px); }
  100% { transform: translateX(0); }
}

@keyframes swordSlash {
  0% { transform: rotate(0deg) translateX(0); }
  30% { transform: rotate(-30deg) translateX(-20px); }
  50% { transform: rotate(15deg) translateX(40px); }
  100% { transform: rotate(0deg) translateX(0); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes progressFill {
  from { width: 0; }
}

@keyframes damageFlash {
  0%, 100% { background-color: transparent; }
  50% { background-color: rgba(255, 58, 58, 0.3); }
}

/* ─── Header ─── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
  background: var(--panel);
  border-bottom: 2px solid var(--panel-border);
}
.header h1 {
  font-size: 1.3rem;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-stats {
  display: flex;
  gap: 20px;
  font-size: 0.85rem;
  color: var(--text-dim);
}
.header-stats span { display: flex; align-items: center; gap: 5px; }
.header-stats .val { color: var(--gold); font-weight: bold; }
.btn-stats {
  background: var(--panel-border);
  border: 1px solid #3a3a5a;
  color: var(--text);
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: 0.2s;
}
.btn-stats:hover { background: #3a3a5a; }

/* ─── Main Layout ─── */
.game-container {
  display: flex;
  gap: 0;
  height: calc(100vh - 56px);
}

/* Left panel: forge area */
.forge-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  background: radial-gradient(ellipse at bottom, #1a1018 0%, var(--bg) 70%);
  overflow: hidden;
}

.forge-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.25;
  pointer-events: none;
  overflow: hidden;
}
.forge-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(3px) brightness(0.6);
}

.stage-label {
  font-size: 1rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  z-index: 1;
}

.sword-display {
  position: relative;
  width: 200px;
  height: 340px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}
.sword-display img {
  max-width: 100%;
  max-height: 100%;
  mix-blend-mode: screen;
  transition: transform 0.3s;
}
.sword-display.forging img {
  animation: glowPulse 1.5s infinite;
}

.spark-container {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}
.spark {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: sparkFly 0.6s ease-out forwards;
}

.upgrade-level {
  margin-top: 12px;
  font-size: 1.4rem;
  font-weight: bold;
  z-index: 1;
}
.upgrade-level .level-text {
  background: linear-gradient(180deg, var(--gold), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.forge-progress {
  width: 80%;
  max-width: 280px;
  height: 10px;
  background: #222238;
  border-radius: 5px;
  margin-top: 12px;
  overflow: hidden;
  z-index: 1;
}
.forge-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 5px;
  transition: width 0.4s ease;
}

.message-area {
  margin-top: 16px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 1;
}
.message {
  font-size: 1.1rem;
  font-weight: bold;
  animation: fadeIn 0.3s ease;
}
.message.success { color: var(--success); }
.message.fail { color: var(--danger); }

/* Right panel: input area */
.input-panel {
  width: 380px;
  background: var(--panel);
  border-left: 2px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  padding: 24px;
}

.dan-info {
  text-align: center;
  margin-bottom: 20px;
}
.dan-info .dan-number {
  font-size: 2.8rem;
  font-weight: bold;
  color: var(--accent);
}
.dan-info .dan-label {
  font-size: 0.9rem;
  color: var(--text-dim);
}

.question-display {
  text-align: center;
  margin-bottom: 24px;
  padding: 20px;
  background: #1a1a30;
  border-radius: 12px;
  border: 1px solid var(--panel-border);
}
.question-display .question-text {
  font-size: 2.2rem;
  font-weight: bold;
  letter-spacing: 2px;
}
.question-display .question-text .op { color: var(--accent); }
.question-display .question-text .eq { color: var(--gold); }

.answer-input-row {
  margin-bottom: 16px;
  width: 100%;
  min-width: 0;
  box-sizing: border-box;
}
.answer-input {
  display: block;
  width: 100%;
  box-sizing: border-box;
  background: #1a1a30;
  border: 2px solid var(--panel-border);
  border-radius: 10px;
  color: var(--text);
  font-size: 2rem;
  text-align: center;
  padding: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.answer-input:focus { border-color: var(--accent); }
.answer-input.correct { border-color: var(--success); background: rgba(0, 232, 123, 0.08); }
.answer-input.wrong { border-color: var(--danger); background: rgba(255, 58, 58, 0.08); }

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.numpad button {
  background: #222238;
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-size: 1.4rem;
  padding: 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.15s;
}
.numpad button:hover { background: #2e2e48; }
.numpad button:active { background: var(--accent); color: #fff; transform: scale(0.95); }
.numpad .btn-clear { color: var(--danger); }
.numpad .btn-enter {
  background: var(--accent);
  color: #fff;
  font-weight: bold;
}
.numpad .btn-enter:hover { background: var(--accent-glow); }

/* ─── Hint (coolant) ─── */
.hint-box {
  margin-top: 16px;
  padding: 14px;
  background: rgba(0, 120, 255, 0.1);
  border: 1px solid rgba(0, 120, 255, 0.3);
  border-radius: 10px;
  display: none;
  animation: fadeIn 0.4s ease;
}
.hint-box.visible { display: block; }
.hint-box .hint-title {
  font-size: 0.9rem;
  color: #4da6ff;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.hint-box .hint-content {
  font-size: 1.1rem;
  color: #88ccff;
  font-weight: bold;
}

/* ─── Right-panel progress pills ─── */
.dan-progress-pills {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: auto;
  padding-top: 16px;
}
.pill {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: bold;
  background: #222238;
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  transition: 0.3s;
}
.pill.mastered {
  background: linear-gradient(135deg, var(--accent), var(--gold));
  color: #000;
  border-color: var(--gold);
}
.pill.current {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 8px rgba(255, 106, 0, 0.4);
}

/* ─── Boss Overlay ─── */
.boss-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.5s ease;
}
.boss-overlay.active { display: flex; }

.boss-scene {
  display: flex;
  align-items: flex-end;
  gap: 60px;
  margin-bottom: 30px;
}
.boss-sprite {
  width: 180px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.boss-sprite img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.boss-sprite.hit { animation: bossHit 0.5s ease; }

.boss-attack-effect {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.boss-attack-effect img {
  max-width: 120%;
  max-height: 120%;
  object-fit: contain;
}
.boss-attack-effect.active {
  opacity: 1;
  animation: attackEffectFade 0.6s ease-out forwards;
}
@keyframes attackEffectFade {
  0%   { opacity: 1; transform: scale(0.8); }
  40%  { opacity: 1; transform: scale(1.1); }
  100% { opacity: 0; transform: scale(1.2); }
}

.player-sprite {
  width: 120px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.player-sprite img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.player-sprite.attacking { animation: swordSlash 0.4s ease; }

.boss-hp-container {
  width: 400px;
  max-width: 90vw;
  margin-bottom: 20px;
}
.boss-name {
  font-size: 1.2rem;
  color: var(--danger);
  font-weight: bold;
  margin-bottom: 6px;
  text-align: center;
}
.boss-hp-bar {
  height: 18px;
  background: #333;
  border-radius: 9px;
  overflow: hidden;
  border: 2px solid #555;
}
.boss-hp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--danger), #ff6666);
  border-radius: 7px;
  transition: width 0.5s ease;
}

.boss-question {
  font-size: 2rem;
  font-weight: bold;
  margin-bottom: 20px;
}
.boss-question .op { color: var(--accent); }
.boss-question .eq { color: var(--gold); }

.boss-input-row {
  display: flex;
  justify-content: center;
  gap: 10px;
}
.boss-answer-input {
  background: #1a1a30;
  border: 2px solid var(--panel-border);
  border-radius: 10px;
  color: var(--text);
  font-size: 1.8rem;
  text-align: center;
  padding: 10px 20px;
  width: 200px;
  outline: none;
}
.boss-answer-input:focus { border-color: var(--accent); }

.boss-numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
  max-width: 300px;
}
.boss-numpad button {
  background: #222238;
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-size: 1.4rem;
  padding: 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.15s;
}
.boss-numpad button:hover { background: #2e2e48; }
.boss-numpad button:active { background: var(--accent); color: #fff; transform: scale(0.95); }
.boss-numpad .btn-clear { color: var(--danger); }
.boss-numpad .btn-enter {
  background: var(--danger);
  color: #fff;
  font-weight: bold;
}
.boss-numpad .btn-enter:hover { background: #ff4444; }

.boss-message {
  margin-top: 16px;
  font-size: 1.1rem;
  height: 30px;
  font-weight: bold;
}

.boss-attempts-left {
  margin-top: 8px;
  font-size: 0.9rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.boss-attempts-left.warning { color: var(--danger); font-weight: bold; }

.boss-damage-text {
  position: absolute;
  color: var(--gold);
  font-size: 2rem;
  font-weight: bold;
  pointer-events: none;
  animation: floatUp 0.8s ease-out forwards;
}

/* ─── Stats Overlay ─── */
.stats-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.88);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.stats-overlay.active { display: flex; }

.stats-panel {
  background: var(--panel);
  border: 2px solid var(--panel-border);
  border-radius: 16px;
  padding: 32px;
  width: 560px;
  max-width: 95vw;
  max-height: 85vh;
  overflow-y: auto;
  animation: fadeIn 0.3s ease;
}
.stats-panel h2 {
  font-size: 1.4rem;
  color: var(--gold);
  margin-bottom: 20px;
  text-align: center;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  background: #1a1a30;
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 1.8rem;
  font-weight: bold;
  color: var(--accent);
}
.stat-card .stat-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 4px;
}

.recent-chart {
  margin-bottom: 20px;
}
.recent-chart h3 {
  font-size: 1rem;
  color: var(--text-dim);
  margin-bottom: 10px;
}
.recent-bar-container {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 60px;
  padding: 4px 0;
}
.recent-bar {
  flex: 1;
  min-width: 4px;
  border-radius: 2px 2px 0 0;
  transition: 0.2s;
}
.recent-bar.correct { background: var(--success); }
.recent-bar.wrong { background: var(--danger); }
.recent-bar.empty { background: #222238; }

.dan-mastery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.dan-mastery-card {
  background: #1a1a30;
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  border: 1px solid var(--panel-border);
}
.dan-mastery-card.mastered { border-color: var(--success); }
.dan-mastery-card .dan-num {
  font-size: 1.2rem;
  font-weight: bold;
}
.dan-mastery-card .dan-status {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 2px;
}
.dan-mastery-card.mastered .dan-status { color: var(--success); }

.btn-close-stats {
  display: block;
  margin: 0 auto;
  background: var(--panel-border);
  border: none;
  color: var(--text);
  padding: 10px 32px;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
}
.btn-close-stats:hover { background: #3a3a5a; }

/* ─── Victory Overlay ─── */
.victory-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 300;
}
.victory-overlay.active { display: flex; }
.victory-overlay h1 {
  font-size: 2.5rem;
  background: linear-gradient(90deg, var(--gold), var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}
.victory-overlay .victory-sub {
  font-size: 1.1rem;
  color: var(--text-dim);
  margin-bottom: 24px;
}
.victory-sword {
  width: 180px;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
  animation: glowPulse 2s infinite;
}
.victory-sword img {
  max-width: 100%;
  max-height: 100%;
  mix-blend-mode: screen;
}
.btn-restart {
  background: linear-gradient(135deg, var(--gold), var(--accent));
  border: none;
  color: #000;
  font-size: 1.1rem;
  font-weight: bold;
  padding: 14px 40px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 16px;
}
.btn-restart:hover { transform: scale(1.05); }

/* ─── Start Screen ─── */
.start-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 400;
  transition: opacity 0.5s;
}
.start-overlay.hidden { opacity: 0; pointer-events: none; }
.start-overlay h1 {
  font-size: 2.4rem;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.start-overlay .sub {
  color: var(--text-dim);
  margin-bottom: 32px;
  font-size: 1rem;
}
.start-sword {
  width: 140px;
  height: 240px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 32px;
}
.start-sword img {
  max-width: 100%;
  max-height: 100%;
  mix-blend-mode: screen;
  animation: glowPulse 2s infinite;
}
.btn-start {
  background: linear-gradient(135deg, var(--accent), #e05500);
  border: none;
  color: #fff;
  font-size: 1.3rem;
  font-weight: bold;
  padding: 16px 52px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}
.btn-start:hover { transform: scale(1.06); box-shadow: 0 6px 30px rgba(255, 106, 0, 0.5); }
.btn-continue {
  margin-top: 12px;
  background: transparent;
  border: 2px solid var(--panel-border);
  color: var(--text-dim);
  font-size: 1rem;
  padding: 12px 40px;
  border-radius: 10px;
  cursor: pointer;
}
.btn-continue:hover { border-color: var(--accent); color: var(--text); }
.btn-continue.hidden { display: none; }

/* ─── Floating text ─── */
.float-text {
  position: fixed;
  pointer-events: none;
  font-size: 1.6rem;
  font-weight: bold;
  z-index: 50;
  animation: floatUp 1s ease-out forwards;
}

/* ─── Forge Fail Flash ─── */
@keyframes failFlash {
  0%   { background: rgba(255, 30, 30, 0); }
  15%  { background: rgba(255, 30, 30, 0.55); }
  35%  { background: rgba(255, 30, 30, 0.2); }
  55%  { background: rgba(255, 30, 30, 0.45); }
  100% { background: rgba(255, 30, 30, 0); }
}
@keyframes crackShake {
  0%   { transform: translate(0,0) rotate(0deg); }
  10%  { transform: translate(-10px,-6px) rotate(-4deg); }
  25%  { transform: translate(12px, 8px) rotate(5deg); }
  40%  { transform: translate(-8px, 4px) rotate(-3deg); }
  55%  { transform: translate(6px,-4px) rotate(2deg); }
  70%  { transform: translate(-4px, 2px) rotate(-1deg); }
  100% { transform: translate(0,0) rotate(0deg); }
}
@keyframes swordCrack {
  0%   { filter: brightness(1); opacity: 1; }
  20%  { filter: brightness(3) saturate(0); opacity: 0.9; }
  40%  { filter: brightness(0.5) saturate(0) hue-rotate(0deg); opacity: 0.7; }
  60%  { filter: brightness(2) saturate(0); opacity: 0.5; }
  80%  { filter: brightness(0.3) saturate(0); opacity: 0.3; }
  100% { filter: brightness(1) saturate(0); opacity: 0.6; }
}
.fail-flash { animation: failFlash 0.7s ease-out forwards; }
.crack-shake { animation: crackShake 0.7s ease-out; }
.sword-crack  { animation: swordCrack 0.8s ease-out forwards; }

// ═══════════════════════════════════════════════════════════
// AudioContext: 금속 타격음 합성
// ═══════════════════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playHitSound() {
  ensureAudioCtx();
  const t = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.type = 'square';
  osc.frequency.setValueAtTime(800, t);
  osc.frequency.exponentialRampToValueAtTime(200, t + 0.08);

  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(2000, t);
  filter.Q.setValueAtTime(1, t);

  gain.gain.setValueAtTime(0.5, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(t);
  osc.stop(t + 0.15);

  const noise = audioCtx.createBufferSource();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  noise.buffer = buf;

  const nGain = audioCtx.createGain();
  nGain.gain.setValueAtTime(0.4, t);
  nGain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);

  const nFilter = audioCtx.createBiquadFilter();
  nFilter.type = 'highpass';
  nFilter.frequency.setValueAtTime(4000, t);

  noise.connect(nFilter);
  nFilter.connect(nGain);
  nGain.connect(audioCtx.destination);
  noise.start(t);
  noise.stop(t + 0.1);
}

function playFailSound() {
  ensureAudioCtx();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.linearRampToValueAtTime(80, t + 0.3);
  gain.gain.setValueAtTime(0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.3);
}

const blacksmithSfx = new Audio('blacksmith.mp3');
blacksmithSfx.preload = 'auto';

const attackSwingSfx = new Audio('quick-swing-sound-419581.mp3');

  blacksmithSfx.currentTime = 0;
  blacksmithSfx.play().catch(() => {});
}

  attackSwingSfx.currentTime = 0;

}

function playVictorySound() {
  ensureAudioCtx();
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, t + i * 0.12);
    gain.gain.setValueAtTime(0.3, t + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.12 + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t + i * 0.12);
    osc.stop(t + i * 0.12 + 0.4);
  });
}

  try {
    const saved = localStorage.getItem('multiplicationBlacksmith');
    const savedStats = localStorage.getItem('multiplicationBlacksmithStats');
    
    if (saved) {
      state = { ...deepCopy(DEFAULT_STATE), ...JSON.parse(saved) };
    } else {
      state = deepCopy(DEFAULT_STATE);
    }
    
    if (savedStats) {
      stats = { ...deepCopy(DEFAULT_STATS), ...JSON.parse(savedStats) };
    } else {
      stats = deepCopy(DEFAULT_STATS);
    }
    
    return !!saved;
  } catch (e) {
    state = deepCopy(DEFAULT_STATE);
    stats = deepCopy(DEFAULT_STATS);
    return false;
  }
}

function saveState() {
  localStorage.setItem('multiplicationBlacksmith', JSON.stringify(state));
  localStorage.setItem('multiplicationBlacksmithStats', JSON.stringify(stats));
}

// ═══════════════════════════════════════════════════════════
// last30Results 큐 관리
// ═══════════════════════════════════════════════════════════
function pushResult(isCorrect) {
  stats.last30Results.push(isCorrect ? 1 : 0);
  if (stats.last30Results.length > 30) stats.last30Results.shift();
}

function getRecent30Rate() {
  if (stats.last30Results.length === 0) return null;
  const sum = stats.last30Results.reduce((a, b) => a + b, 0);
  return Math.round((sum / stats.last30Results.length) * 100);
}

// ═══════════════════════════════════════════════════════════
// UI 업데이트
// ═══════════════════════════════════════════════════════════
function updateHeaderStats() {
  const rate = stats.totalAttempts > 0 ? Math.round((stats.totalCorrect / stats.totalAttempts) * 100) : 0;
  els.headerAccuracy.textContent = rate + '%';
  els.headerCorrect.textContent = stats.totalCorrect;
  const r30 = getRecent30Rate();
  els.headerRecent.textContent = r30 !== null ? r30 + '%' : '-%';
}

function updateQuestion() {
  els.danNumber.textContent = state.currentDan;
  els.qNum1.textContent = state.currentDan;
  els.qNum2.textContent = state.currentMultiplier;
  els.stageLabel.textContent = `${state.currentDan}단 강화 중...`;
  const progress = ((state.currentMultiplier - 1) / 9) * 100;
  els.forgeProgressBar.style.width = progress + '%';
}

function updateSword() {
  const lvl = Math.min(state.swordLevel, SWORD_LEVELS.length - 1);
  const sword = SWORD_LEVELS[lvl];
  els.swordImg.alt = sword.alt;
  els.upgradeLevel.textContent = sword.name;
  els.swordImg.src = swordImagePath(state.swordLevel + 1);
}

function updateDanPills() {
  let html = '';
  for (let d = 2; d <= 9; d++) {
    const mastered = state.danMastery[d];
    const current = d === state.currentDan && !mastered;
    const cls = mastered ? 'mastered' : current ? 'current' : '';
    html += `<div class="pill ${cls}">${d}</div>`;
  }
  els.danPills.innerHTML = html;
}

function showMessage(text, type) {
  els.forgeMessage.textContent = text;
  els.forgeMessage.className = 'message ' + type;
  els.forgeMessage.style.animation = 'none';
  void els.forgeMessage.offsetWidth;
  els.forgeMessage.style.animation = '';
}

function clearMessage() {
  els.forgeMessage.textContent = '';
}

// ═══════════════════════════════════════════════════════════
// 스파크 이펙트
// ═══════════════════════════════════════════════════════════
function spawnSparks(count) {
  const container = els.sparkContainer;
  for (let i = 0; i < count; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 80;
    spark.style.left = '50%';
    spark.style.top = '50%';
    spark.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
    spark.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
    spark.style.background = Math.random() > 0.5 ? 'var(--gold)' : 'var(--accent)';
    container.appendChild(spark);
    setTimeout(() => spark.remove(), 600);
  }
}

// ═══════════════════════════════════════════════════════════
// 플로팅 텍스트
// ═══════════════════════════════════════════════════════════
function floatText(text, color, x, y) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.color = color;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ═══════════════════════════════════════════════════════════
// 힌트 시스템 (냉각수)
// ═══════════════════════════════════════════════════════════
function showHint(a, b) {
  const terms = Array(b).fill(a).join(' + ');
  els.hintContent.textContent = `${a}를 ${b}번 더하면? (${terms})`;
  els.hintBox.classList.add('visible');
}

function hideHint() {
  els.hintBox.classList.remove('visible');
}

// ═══════════════════════════════════════════════════════════
// 강화 (정답/오답 처리)
// ═══════════════════════════════════════════════════════════
let inputLocked = false;

function submitAnswer() {
  if (inputLocked) return;
  const val = els.answerInput.value.trim();
  if (val === '') return;
  const answer = parseInt(val, 10);
  const correct = state.currentDan * state.currentMultiplier;

  stats.totalAttempts++;

  if (answer === correct) {
    handleCorrect();
  } else {
    handleWrong();
  }

  els.answerInput.value = '';
  saveState();
  updateHeaderStats();
}

function handleCorrect() {
  stats.totalCorrect++;
  pushResult(true);

  playBlacksmithSound();

  els.gameContainer.classList.add('shake');
  setTimeout(() => els.gameContainer.classList.remove('shake'), 400);

  els.answerInput.classList.add('correct');
  setTimeout(() => els.answerInput.classList.remove('correct'), 500);

  spawnSparks(12);
  showMessage(`깡! 강화 성공! ${state.currentDan} × ${state.currentMultiplier} = ${state.currentDan * state.currentMultiplier}`, 'success');
  hideHint();

  const rect = els.swordDisplay.getBoundingClientRect();
  floatText('+1', 'var(--success)', rect.left + rect.width / 2, rect.top);

  state.currentMultiplier++;

  if (state.currentMultiplier > 9) {
    state.danMastery[state.currentDan] = true;
    state.swordLevel = Math.min(state.swordLevel + 1, SWORD_LEVELS.length - 1);
    updateSword();
    showMessage(`+${state.currentDan}단 검 획득! 보스전 돌입!`, 'success');

    inputLocked = true;
    setTimeout(() => {
      inputLocked = false;
      startBoss(state.currentDan);
    }, 1200);
  } else {
    updateQuestion();
  }

  updateDanPills();
}

function handleWrong() {
  pushResult(false);
  playFailSound();

  els.answerInput.classList.add('wrong');
  setTimeout(() => els.answerInput.classList.remove('wrong'), 400);

  // 화면 전체 붉은 플래시 + 검 흔들림
  document.body.classList.add('fail-flash');
  els.gameContainer.classList.add('crack-shake');
  els.swordDisplay.classList.add('sword-crack');
  setTimeout(() => {
    document.body.classList.remove('fail-flash');
    els.gameContainer.classList.remove('crack-shake');
  }, 800);

  inputLocked = true;

  // 강등 계산
  const fromDan = state.currentDan;
  const fromMult = state.currentMultiplier;

  let toDan, toMult;
  if (fromDan > 2) {
    // 앞 단계의 처음으로
    toDan  = fromDan - 1;
    toMult = 1;
  } else {
    // 2단이면 같은 단계 처음부터
    toDan  = 2;
    toMult = 1;
  }

  // 실패 오버레이 내용 설정
  els.failSubtitle.textContent =
    `정답은 ${fromDan} × ${fromMult} = ${fromDan * fromMult} 입니다!`;
  if (fromDan > 2) {
    els.failDowngrade.innerHTML =
      `강화 단계: <b>${fromDan}단</b> → <b>${toDan}단</b> 처음으로 강등…`;
  } else {
    els.failDowngrade.innerHTML =
      `<b>2단</b> 강화를 처음부터 다시 시작합니다…`;
  }

  setTimeout(() => {
    els.swordDisplay.classList.remove('sword-crack');
    // 실패 오버레이 표시
    els.failOverlay.classList.add('active');
    // 상태 강등
    state.currentDan        = toDan;
    state.currentMultiplier = toMult;
    // 강등된 단의 마스터 취소
    state.danMastery[fromDan] = false;
    if (fromDan > 2) state.danMastery[toDan] = false;
    // 검 레벨도 한 단계 낮춤 (최소 0)
    state.swordLevel = Math.max(0, state.swordLevel - 1);
    saveState();
    updateDanPills();
    updateSword();
  }, 900);
}

// ═══════════════════════════════════════════════════════════
// 보스전
// ═══════════════════════════════════════════════════════════
/** 보스 HP당 허용 오답 수: 오답이 이 횟수를 넘으면 보스전 패배 */
const BOSS_MAX_WRONG = 3;
const BOSS_PHASE2_MAX_WRONG = 4;

let bossState = { 
  dan: 2, 
  hp: 0, 
  maxHp: 0, 
  questions: [], 
  qIdx: 0, 
  wrongCount: 0, 
  maxWrong: BOSS_MAX_WRONG,
  isPhase2: false,
  usedDans: []
};

function updateBossAttemptsUI() {
  const left = bossState.maxWrong - bossState.wrongCount;
  const hearts = '❤️'.repeat(Math.max(left, 0)) + '🖤'.repeat(Math.max(bossState.maxWrong - left, 0));
  els.bossAttemptsLeft.textContent = `도전 기회: ${hearts}`;
  els.bossAttemptsLeft.classList.toggle('warning', left <= 1);
}

function startBoss(dan, isPhase2 = false) {
  const bossIdx = dan - 2;
  const boss = BOSS_DATA[bossIdx];

  const questions = [];
  const pool = [];
  
  if (isPhase2) {
    // 2페이즈: 2~9단 무작위 (중복 허용)
    const allDans = [2, 3, 4, 5, 6, 7, 8, 9];
    for (let i = 0; i < boss.hp * 2; i++) {
      const randomDan = allDans[Math.floor(Math.random() * allDans.length)];
      const randomMult = Math.floor(Math.random() * 9) + 1;
      questions.push({ dan: randomDan, mult: randomMult });
    }
  } else {
    // 1페이즈: 단일 단
    for (let m = 1; m <= 9; m++) pool.push(m);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    for (let i = 0; i < boss.hp; i++) {
      questions.push({ dan: dan, mult: pool[i % pool.length] });
    }
  }

  bossState = {
    dan,
    hp: isPhase2 ? boss.hp * 2 : boss.hp,
    maxHp: isPhase2 ? boss.hp * 2 : boss.hp,
    questions,
    qIdx: 0,
    wrongCount: 0,
    maxWrong: isPhase2 ? BOSS_PHASE2_MAX_WRONG : BOSS_MAX_WRONG,
    isPhase2,
    usedDans: []
  };

  if (isPhase2) {
    els.bossName.textContent = `💀 ${boss.name} — 각성 형태`;
  } else {
    els.bossName.textContent = `🐉 ${boss.name}`;
  }
  els.bossImg.alt = boss.alt;
  els.bossImg.src = boss.img;
  els.bossHpFill.style.width = '100%';
  els.bossMessage.textContent = '';
  els.bossAnswerInput.value = '';

  updateBossAttemptsUI();
  updateBossQuestion();
  els.bossOverlay.classList.add('active');
  els.bossAnswerInput.focus();
}

function updateBossQuestion() {
  const q = bossState.questions[bossState.qIdx];
  els.bqNum1.textContent = q.dan;
  els.bqNum2.textContent = q.mult;
}

function submitBossAnswer() {
  const val = els.bossAnswerInput.value.trim();
  if (val === '') return;
  const answer = parseInt(val, 10);
  const q = bossState.questions[bossState.qIdx];
  const correct = q.dan * q.mult;

  stats.totalAttempts++;

  if (answer === correct) {
    stats.totalCorrect++;
    pushResult(true);

    playAttackSwingSound();

    els.playerSprite.classList.add('attacking');
    setTimeout(() => els.playerSprite.classList.remove('attacking'), 400);
    
    setTimeout(() => {
      // 보스 스프라이트 흔들림
      els.bossSprite.classList.add('hit');
      setTimeout(() => els.bossSprite.classList.remove('hit'), 500);
      
      // 공격 이펙트 재생
      els.bossAttackEffect.classList.add('active');
      setTimeout(() => {
        els.bossAttackEffect.classList.remove('active');
      }, 600);
    }, 200);

    bossState.hp--;
    const pct = Math.max(0, (bossState.hp / bossState.maxHp) * 100);
    els.bossHpFill.style.width = pct + '%';

    const swordLvl = state.swordLevel;
    const dmg = swordLvl + 1;
    const rect = els.bossSprite.getBoundingClientRect();
    floatText(`-${dmg} DMG`, 'var(--gold)', rect.left + rect.width / 2, rect.top);

    els.bossMessage.textContent = `⚔ ${correct}! 대미지 ${dmg}!`;
    els.bossMessage.style.color = 'var(--success)';

    if (bossState.hp <= 0) {
      // 9단 1페이즈 클리어 시 2페이즈 전환
      if (bossState.dan === 9 && !bossState.isPhase2) {
        els.bossMessage.textContent = '⚠️ 보스가 각성합니다!';
        playVictorySound();
        
        // 번쩍이는 임팩트
        setTimeout(() => {
          els.bossSprite.style.filter = 'brightness(3) saturate(2)';
          setTimeout(() => { els.bossSprite.style.filter = 'brightness(0.5)'; }, 100);
          setTimeout(() => { els.bossSprite.style.filter = 'brightness(3) saturate(2)'; }, 250);
          setTimeout(() => { els.bossSprite.style.filter = 'brightness(0.5)'; }, 350);
          setTimeout(() => { els.bossSprite.style.filter = 'brightness(3) saturate(2)'; }, 500);
          setTimeout(() => { 
            els.bossSprite.style.filter = ''; 
            els.bossOverlay.classList.remove('active');
            setTimeout(() => startBoss(9, true), 300);
          }, 700);
        }, 1000);
        
      } else {
        // 일반 보스 클리어 또는 9단 2페이즈 클리어
        els.bossMessage.textContent = '🎉 보스 처치 성공!';
        playVictorySound();
        setTimeout(() => finishBoss(), 1500);
      }
    } else {
      bossState.qIdx++;
      if (bossState.qIdx >= bossState.questions.length) bossState.qIdx = 0;
      setTimeout(() => updateBossQuestion(), 600);
    }
  } else {
    pushResult(false);
    playFailSound();

    bossState.wrongCount++;
    els.bossMessage.textContent = `🔥 빗나감! ${q.dan} × ${q.mult} = ${correct}`;
    els.bossMessage.style.color = 'var(--danger)';
    updateBossAttemptsUI();

    if (bossState.wrongCount >= bossState.maxWrong) {
      // 보스 패배 처리
      els.bossAnswerInput.value = '';
      saveState();
      updateHeaderStats();
      setTimeout(() => defeatBoss(), 900);
      return;
    }

    bossState.qIdx++;
    if (bossState.qIdx >= bossState.questions.length) bossState.qIdx = 0;
    setTimeout(() => updateBossQuestion(), 800);
  }

  els.bossAnswerInput.value = '';
  saveState();
  updateHeaderStats();
}

function defeatBoss() {
  els.bossOverlay.classList.remove('active');

  const dan = bossState.dan;
  const boss = BOSS_DATA[dan - 2];

  // 패배 오버레이 내용 설정
  els.bossDefeatTitle.textContent = `💀 ${boss.name} 토벌 실패!`;
  els.bossDefeatSubtitle.textContent = `${BOSS_MAX_WRONG}번의 기회를 모두 소진했습니다…`;
  els.bossDefeatDowngrade.innerHTML =
    `<b>${dan}단</b> 강화를 처음부터 다시 시작합니다.`;

  // 상태 초기화: 해당 단 강화를 처음부터
  state.danMastery[dan] = false;
  state.currentDan = dan;
  state.currentMultiplier = 1;
  // 검 레벨 한 단계 낮춤
  state.swordLevel = Math.max(0, state.swordLevel - 1);
  saveState();
  updateSword();
  updateDanPills();

  els.bossDefeatOverlay.classList.add('active');
}

function finishBoss() {
  els.bossOverlay.classList.remove('active');

  if (state.currentDan >= 9) {
    endGame();
    return;
  }

  state.currentDan++;
  state.currentMultiplier = 1;
  saveState();
  updateQuestion();
  updateSword();
  updateDanPills();
  els.answerInput.focus();
  showMessage(`${state.currentDan}단 강화를 시작합니다!`, 'success');
}

// ═══════════════════════════════════════════════════════════
// 게임 종료
// ═══════════════════════════════════════════════════════════
function endGame() {
  const elapsed = state.speedrunStart ? Date.now() - state.speedrunStart : 0;
  const timeStr = formatTime(elapsed);

  if (!stats.bestSpeedrun || elapsed < stats.bestSpeedrun) {
    stats.bestSpeedrun = elapsed;
  }
  saveState();

  els.victoryTime.textContent = timeStr;
  els.victorySwordImg.src = swordImagePath(9);
  els.victoryOverlay.classList.add('active');
  playVictorySound();
}

function formatTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

// ═══════════════════════════════════════════════════════════
// 통계
// ═══════════════════════════════════════════════════════════
function openStats() {
  els.statTotal.textContent = stats.totalCorrect;
  const rate = stats.totalAttempts > 0 ? Math.round((stats.totalCorrect / stats.totalAttempts) * 100) : 0;
  els.statAccuracy.textContent = rate + '%';
  const r30 = getRecent30Rate();
  els.statRecent30.textContent = r30 !== null ? r30 + '%' : '-%';
  els.statSpeedrun.textContent = stats.bestSpeedrun ? formatTime(stats.bestSpeedrun) : '--:--';

  let barsHtml = '';
  for (let i = 0; i < 30; i++) {
    if (i < stats.last30Results.length) {
      const cls = stats.last30Results[i] === 1 ? 'correct' : 'wrong';
      barsHtml += `<div class="recent-bar ${cls}" style="height:${stats.last30Results[i] === 1 ? 100 : 30}%"></div>`;
    } else {
      barsHtml += '<div class="recent-bar empty" style="height:20%"></div>';
    }
  }
  els.recentBars.innerHTML = barsHtml;

  let masteryHtml = '';
  for (let d = 2; d <= 9; d++) {
    const m = state.danMastery[d];
    masteryHtml += `
      <div class="dan-mastery-card ${m ? 'mastered' : ''}">
        <div class="dan-num" style="color:${m ? 'var(--success)' : 'var(--text-dim)'}">${d}단</div>
        <div class="dan-status">${m ? '✅ 마스터' : '🔒 미완료'}</div>
      </div>`;
  }
  els.danMasteryGrid.innerHTML = masteryHtml;

  els.statsOverlay.classList.add('active');
}

function closeStats() {
  els.statsOverlay.classList.remove('active');
}

// ═══════════════════════════════════════════════════════════
// 초기화 / 시작
// ═══════════════════════════════════════════════════════════
function initGame(fresh) {
  if (fresh) {
    state = deepCopy(DEFAULT_STATE);
  }
  state.speedrunStart = Date.now();
  saveState();

  updateQuestion();
  updateSword();
  updateDanPills();
  updateHeaderStats();
  hideHint();
  clearMessage();

  els.startOverlay.classList.add('hidden');
  setTimeout(() => { els.startOverlay.style.display = 'none'; }, 500);

  els.answerInput.focus();
}

function restartGame() {
  els.victoryOverlay.classList.remove('active');
  state = deepCopy(DEFAULT_STATE);
  state.speedrunStart = Date.now();
  saveState();
  updateQuestion();
  updateSword();
  updateDanPills();
  updateHeaderStats();
  hideHint();
  clearMessage();
  els.forgeProgressBar.style.width = '0%';
  els.answerInput.focus();
}

// ═══════════════════════════════════════════════════════════
// 이벤트 바인딩
// ═══════════════════════════════════════════════════════════
els.btnStart.addEventListener('click', () => initGame(true));
els.btnContinue.addEventListener('click', () => initGame(false));
els.answerInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

document.getElementById('numpad').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const val = btn.dataset.val;
  if (val === 'clear') {
    els.answerInput.value = '';
  } else if (val === 'enter') {
    submitAnswer();
  } else {
    els.answerInput.value += val;
  }
  els.answerInput.focus();
});

els.bossAnswerInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitBossAnswer();
});

document.getElementById('bossNumpad').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const val = btn.dataset.val;
  if (val === 'clear') {
    els.bossAnswerInput.value = '';
  } else if (val === 'enter') {
    submitBossAnswer();
  } else {
    els.bossAnswerInput.value += val;
  }
  els.bossAnswerInput.focus();
});

els.btnOpenStats.addEventListener('click', openStats);
els.btnCloseStats.addEventListener('click', closeStats);
els.statsOverlay.addEventListener('click', e => {
  if (e.target === els.statsOverlay) closeStats();
});

els.btnRestart.addEventListener('click', restartGame);

els.btnFailOk.addEventListener('click', () => {
  els.failOverlay.classList.remove('active');
  inputLocked = false;
  updateQuestion();
  hideHint();
  clearMessage();
  els.answerInput.focus();
});

els.btnBossDefeatOk.addEventListener('click', () => {
  els.bossDefeatOverlay.classList.remove('active');
  updateQuestion();
  clearMessage();
  els.answerInput.focus();
  showMessage(`${state.currentDan}단 강화를 다시 시작합니다!`, 'fail');
});

// ═══════════════════════════════════════════════════════════
// 부팅
// ═══════════════════════════════════════════════════════════
(function boot() {
  const hasSave = loadState();
  if (hasSave && stats.totalAttempts > 0) {
    els.btnContinue.classList.remove('hidden');
  }
  els.startSwordImg.src = swordImagePath(1);
  els.playerImg.src = PLAYER_CHARACTER_IMG;
  updateSword();
  updateDanPills();
  updateHeaderStats();
})();
</script>
</body>
</html>
